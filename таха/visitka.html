<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahmina - Centered Mocca Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@1,400;1,700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --bright-gold: #d4af37;
            --mocca-perfect: #dbcbb6; 
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000;
            font-family: 'Amiri', serif;
            overflow: hidden;
        }

        .card {
            width: 600px;
            height: 340px;
            background-color: var(--mocca-perfect);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 45px 80px rgba(0,0,0,0.5);
            overflow: hidden;
            /* Центрируем всё содержимое карточки */
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            border: 2px solid var(--bright-gold);
            box-sizing: border-box;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }

        /* ВОДЯНОЙ ЗНАК: Теперь СТРОГО ПО СЕРЕДИНЕ */
        .watermark {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-family: 'Amiri', serif;
            font-size: 280px;
            font-style: italic;
            color: rgba(105, 84, 59, 0.1); 
            z-index: 1;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        /* ЦЕНТРАЛЬНЫЙ КОНТЕНТ */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* МОНОГРАММА: Прописная, Белая, в Центре */
        .monogram {
            font-family: 'Great Vibes', cursive;
            font-size: 150px;
            color: #ffffff;
            line-height: 0.8;
            letter-spacing: 5px;
            filter: drop-shadow(0 5px 15px rgba(255, 255, 255, 0.5));
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monogram span { 
            font-size: 60px; 
            margin: 0 -5px; 
            font-family: serif;
            font-style: normal;
        }

        .arabic-title {
            font-family: 'Amiri', serif;
            font-style: italic;
            font-size: 22px;
            color: var(--bright-gold);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* УГОЛОК: Тахмина */
        .corner-signature {
            position: absolute;
            bottom: 30px;
            left: 40px;
            z-index: 20;
            opacity: 0.7;
        }

        .signature-text {
            font-family: 'Amiri', serif;
            font-style: italic;
            font-size: 34px;
            color: #69543b; 
            margin: 0;
            line-height: 1;
            transform: rotate(-3deg);
            display: block;
        }

        .signature-line {
            width: 60px;
            height: 1.5px;
            background: var(--bright-gold);
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="watermark">تَهْمِينة</div>

        <div class="main-content">
            <div class="monogram">T<span>&</span>M</div>
        </div>

        <div class="corner-signature">
            <span class="signature-text">تحمينة</span>
            <div class="signature-line"></div>
        </div>
    </div>

</body>
</html>
