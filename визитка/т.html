<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahmina - Dynamic Gold Dust Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Ультра-яркое, контрастное золото */
            --rich-gold: linear-gradient(135deg, #a67c00 0%, #d4af37 35%, #fcf6ba 50%, #b8860b 100%);
            /* Глубокий матовый сине-серый/черный */
            --ultra-dark: #121212; 
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000; /* ПОЛНОСТЬЮ ЧЕРНЫЙ ФОН СЗАДИ */
            font-family: 'Amiri', serif;
            overflow: hidden;
        }

        /* Контур визитки */
        .card {
            width: 600px;
            height: 340px;
            background-color: var(--ultra-dark);
            border-radius: 6px;
            position: relative;
            /* Глубокая тень для объема */
            box-shadow: 0 40px 90px rgba(212, 175, 55, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* ЯРКАЯ ЗОЛОТАЯ РАМКА ПОДЧЕРКНУТА */
            border: 2px solid #fcf6ba; 
            box-sizing: border-box;
            /* Матовая текстура */
            background-image: url('https://www.transparenttextures.com/patterns/dark-dot-2.png');
        }

        /* Водяной знак - теперь ЕДВА ЗАМЕТНЫЙ (темный) */
        .watermark {
            position: absolute;
            font-family: 'Aref Ruqaa', serif;
            font-size: 220px;
            color: rgba(255, 255, 255, 0.012);
            z-index: 1;
            white-space: nowrap;
            transform: rotate(-8deg);
            pointer-events: none;
        }

        .main-design {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* ЭФФЕКТ: Яркий кружащийся шлейф из золотых точек (SVG) */
        .gold-vortex {
            position: absolute;
            width: 320px;
            height: 320px;
            pointer-events: none;
            z-index: 5;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* CSS Анимация вращения шлейфа */
        .gold-vortex svg {
            width: 100%;
            height: 100%;
            animation: vortex-rotate 15s linear infinite;
        }

        /* Монограмма T & M */
        .monogram {
            font-family: 'Playfair Display', serif;
            font-size: 90px;
            background: var(--rich-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 15;
            position: relative;
            /* Усиливаем свечение */
            filter: drop-shadow(0 2px 5px rgba(252, 246, 186, 0.5));
            margin-bottom: 5px;
        }

        .monogram span { font-size: 45px; margin: 0 5px; } /* Символ '&' */

        .arabic-title {
            font-size: 22px;
            color: #d4af37;
            margin: 0;
            font-weight: bold;
            z-index: 15;
        }

        /* Уголок "Тахмина" */
        .corner {
            position: absolute;
            bottom: 25px;
            left: 30px;
            text-align: left;
            z-index: 20;
        }

        .corner-name {
            font-size: 24px;
            background: var(--rich-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
            margin: 0;
            line-height: 1;
        }

        .corner-line {
            width: 35px;
            height: 1.5px;
            background: #fcf6ba;
            margin: 6px 0;
            opacity: 0.7;
        }

        /* АНИМАЦИЯ МЕРЦАНИЯ И ВРАЩЕНИЯ ТОЧЕК */
        @keyframes vortex-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="watermark">تَهْمِينة</div>

        <div class="main-design">
            <div class="gold-vortex">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gold-dots" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#bf953f" />
                            <stop offset="50%" style="stop-color:#fcf6ba" />
                            <stop offset="100%" style="stop-color:#aa771c" />
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="100" r="75" fill="none" stroke="url(#gold-dots)" stroke-width="0.8" stroke-dasharray="1 10" stroke-linecap="round" />
                    <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gold-dots)" stroke-width="0.6" stroke-dasharray="0.5 15" stroke-linecap="round" transform="rotate(-30 100 100)" />
                    <circle cx="150" cy="40" r="1.5" fill="#d4af37" style="animation: twinkle 2s infinite ease-in-out" />
                    <circle cx="40" cy="160" r="1.2" fill="#fcf6ba" style="animation: twinkle 3s infinite ease-in-out" />
                    <circle cx="180" cy="120" r="1" fill="#bf953f" style="animation: twinkle 2.5s infinite ease-in-out" />
                    <circle cx="20" cy="80" r="1.3" fill="#d4af37" style="animation: twinkle 3.5s infinite ease-in-out" />
                    <circle cx="110" cy="190" r="1.1" fill="#fcf6ba" style="animation: twinkle 2.2s infinite ease-in-out" />
                </svg>
            </div>

            <div class="monogram">T<span>&</span>M</div>
            <p class="arabic-title">أتيلييه تصميم عربي</p>
        </div>

        <div class="corner">
            <p class="corner-name">تحمينة</p>
            <div class="corner-line"></div>
        </div>
    </div>

</body>
</html>
